openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: DocuForge API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: documents
    description: Document operations
  - name: templates
    description: Template operations
  - name: exports
    description: Export operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List all documents
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: string
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DocItem"
    post:
      operationId: createDocument
      tags: [documents]
      summary: Create a new document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocCreateInput"
      responses:
        "201":
          description: Created document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocItem"

  /documents/{id}:
    get:
      operationId: getDocument
      tags: [documents]
      summary: Get a document by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocItem"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateDocument
      tags: [documents]
      summary: Update a document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocUpdateInput"
      responses:
        "200":
          description: Updated document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocItem"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteDocument
      tags: [documents]
      summary: Delete a document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /documents/{id}/duplicate:
    post:
      operationId: duplicateDocument
      tags: [documents]
      summary: Duplicate a document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Duplicated document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocItem"
        "404":
          description: Not found

  /documents/stats:
    get:
      operationId: getDocumentStats
      tags: [documents]
      summary: Get document statistics
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocStats"

  /documents/recent:
    get:
      operationId: getRecentDocuments
      tags: [documents]
      summary: Get recently modified documents
      responses:
        "200":
          description: Recent documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DocItem"

  /templates:
    get:
      operationId: listTemplates
      tags: [templates]
      summary: List all document templates
      responses:
        "200":
          description: List of templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DocTemplate"

  /documents/{id}/export:
    post:
      operationId: exportDocument
      tags: [exports]
      summary: Export document to PDF or DOC
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocExportRequest"
      responses:
        "200":
          description: Export result with download URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocExportResult"
        "404":
          description: Not found

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    DocItem:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        type:
          type: string
        content:
          type: string
        description:
          type: ["string", "null"]
        status:
          type: string
        wordCount:
          type: integer
        version:
          type: string
        tags:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - title
        - type
        - content
        - status
        - wordCount
        - version
        - createdAt
        - updatedAt

    DocCreateInput:
      type: object
      properties:
        title:
          type: string
        type:
          type: string
        content:
          type: string
        description:
          type: string
        status:
          type: string
        tags:
          type: string
      required:
        - title
        - type
        - content

    DocUpdateInput:
      type: object
      properties:
        title:
          type: string
        type:
          type: string
        content:
          type: string
        description:
          type: string
        status:
          type: string
        tags:
          type: string

    DocStats:
      type: object
      properties:
        total:
          type: integer
        byType:
          type: object
          additionalProperties:
            type: integer
        byStatus:
          type: object
          additionalProperties:
            type: integer
        totalWords:
          type: integer
        recentCount:
          type: integer
      required:
        - total
        - byType
        - byStatus
        - totalWords
        - recentCount

    DocTemplate:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
        description:
          type: string
        content:
          type: string
        icon:
          type: string
      required:
        - id
        - name
        - type
        - description
        - content
        - icon

    DocExportRequest:
      type: object
      properties:
        format:
          type: string
      required:
        - format

    DocExportResult:
      type: object
      properties:
        format:
          type: string
        filename:
          type: string
        content:
          type: string
        mimeType:
          type: string
      required:
        - format
        - filename
        - content
        - mimeType
