kind = "web"
previewPath = "/"
title = "DocuForge"
version = "1.0.0"
id = "artifacts/docuforge"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21722

[services.development]
run = "pnpm --filter @workspace/docuforge run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/docuforge", "run", "build" ]
publicDir = "artifacts/docuforge/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21722"
BASE_PATH = "/"
